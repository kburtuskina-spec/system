<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">

    <input id="code">
</div>

    <label>Статус</label>

    <select id="status">
        <option value="Активный">Активный</option>
        <option value="Неактивный">Неактивный</option>
    </select>

        <button id="saveBtn">

            class="secondary"
