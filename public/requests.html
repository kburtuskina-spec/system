<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Заявки</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h3>ПНП Вектор-а</h3>

        <a href="index.html">Главная</a>
        <a href="requests.html">Заявки</a>
        <a href="objects.html">Объекты</a>
        <a href="materials.html">Материалы</a>
        <a href="users.html">Пользователи</a>
        <a href="reports.html">Отчеты</a>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <div style="
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        ">

            <h1>Заявки</h1>
<button
    class="btn-export secondary"
    style="margin-right:10px;">
    Экспорт CSV
</button>
            <button class="btn-new-request">
                + Новая заявка
            </button>

        </div>

        <!-- Поиск -->
        <div class="card">

            <div style="display:flex; gap:12px;">

                <input
    id="searchInput"
    type="text"
    placeholder="Поиск по ответственному, материалу или подразделению"
    style="flex:1; width:auto;">

                <select
    id="statusFilter"
    style="width:220px; flex:none;">

                    <option value="">Все статусы</option>
                    <option>Создана</option>
                    <option>В работе</option>
                    <option>Выполнена</option>

                </select>

                <button id="searchBtn">
                    Поиск
                </button>

                <button
                    id="resetBtn"
                    class="secondary"
                >
                    Сброс
                </button>

            </div>

        </div>

        <!-- Таблица -->
        <table id="requestsTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Дата создания</th>
                    <th>Объект</th>
                    <th>Ответственный</th>
                    <th>Материал</th>
                    <th>Кол-во</th>
                    <th>Статус</th>
                    <th>Срок</th>
                    <th>Действия</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="js/common.js"></script>
    <script src="js/requests.js"></script>

</body>

</html>
