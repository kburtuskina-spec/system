<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактирование материала</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="sidebar">

    <h3>ПНП Вектор-а</h3>

    <a href="index.html">Главная</a>
    <a href="requests.html">Заявки</a>
    <a href="objects.html">Объекты</a>
    <a href="materials.html">Материалы</a>
    <a href="users.html">Пользователи</a>
    <a href="reports.html">Отчеты</a>

</div>

<div class="content">

    <h1>Редактирование материала</h1>

    <div class="card">

        <div class="form-group">
            <label>Код материала</label>
            <input id="code">
        </div>

        <div class="form-group">
            <label>Наименование</label>
            <input id="name">
        </div>

        <div class="form-group">
            <label>Единица измерения</label>
            <input id="unit">
        </div>

        <div class="form-group">
            <label>Категория</label>
            <input id="category">
        </div>

        <div class="form-group">
            <label>Остаток</label>
            <input
                id="stock"
                type="number">
        </div>

        <button id="saveBtn">
            Сохранить
        </button>

        <button
            class="secondary"
            onclick="location.href='materials.html'">
            Отмена
        </button>

    </div>

</div>

<script src="js/common.js"></script>
<script src="js/material-edit.js"></script>

</body>
</html>
